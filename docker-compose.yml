services:

  mysql:
    image: mysql:8.0
    container_name: ammp_mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ammp_db

    

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    restart: unless-stopped

  app:
    build: .
    image: ammp:v1
    container_name: ammp_app

    ports:
      - "5000:5000"

    depends_on:
      - mysql

    restart: unless-stopped

volumes:
  mysql_data: