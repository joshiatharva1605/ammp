<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AMMP Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Arial, Helvetica, sans-serif;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:
            linear-gradient(
                rgba(0,0,0,0.5),
                rgba(0,0,0,0.5)
            ),

            url('https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?q=80&w=1920');

            background-size:cover;

            background-position:center;
        }

        .login-container{

            width:400px;

            background:white;

            border-radius:10px;

            padding:40px;

            box-shadow:0 10px 30px rgba(0,0,0,0.3);

        }

        .title{

            text-align:center;

            margin-bottom:30px;
        }

        .title h1{

            color:#1e3a5f;

            margin-bottom:10px;
        }

        .title p{

            color:gray;
        }

        .form-group{

            margin-bottom:20px;
        }

        .form-group label{

            display:block;

            margin-bottom:8px;

            font-weight:bold;

            color:#333;
        }

        .form-group input,
        .form-group select{

            width:100%;

            padding:12px;

            border:1px solid #ccc;

            border-radius:6px;

            font-size:15px;
        }

        .form-group input:focus,
        .form-group select:focus{

            outline:none;

            border:1px solid #2563eb;
        }

        .login-btn{

            width:100%;

            padding:12px;

            border:none;

            border-radius:6px;

            background:#2563eb;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:0.3s;
        }

        .login-btn:hover{

            background:#1d4ed8;
        }

        .demo{

            margin-top:25px;

            background:#f4f6f9;

            padding:15px;

            border-radius:6px;

            font-size:14px;
        }

        .demo p{

            margin-bottom:6px;
        }

        .footer{

            margin-top:20px;

            text-align:center;

            color:gray;

            font-size:13px;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <div class="title">

            <h1>AMMP System</h1>

            <p>Advanced Manpower Monitoring Platform</p>

        </div>

        <form action="/login" method="POST">

            <div class="form-group">

                <label>Username</label>

                <input
                    type="text"
                    name="username"
                    placeholder="Enter Username"
                    required
                >

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter Password"
                    required
                >

            </div>

            <div class="form-group">

                <label>Select Role</label>

                <select name="role" required>

                    <option value="">Choose Role</option>

                    <option value="admin">
                        Admin
                    </option>

                    <option value="supervisor">
                        Supervisor
                    </option>

                </select>

            </div>

            <button class="login-btn" type="submit">

                Login

            </button>

        </form>

        <div class="demo">

            <p><b>Admin:</b> admin / admin123</p>

            <p><b>Supervisor:</b> supervisor / super123</p>

        </div>

        <div class="footer">

            Industry 4.0 Workforce Monitoring System

        </div>

    </div>

</body>

</html>
