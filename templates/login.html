<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AMMP Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
}

.container{
background:white;
padding:40px;
width:360px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
animation:fadeIn 1s ease;
}

.logo{
width:120px;
margin-bottom:10px;
}

h2{
margin-bottom:20px;
color:#333;
}

select,input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#2c5364;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1b3945;
transform:scale(1.03);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(-20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.background-circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.05);
animation:float 6s infinite;
}

.circle1{
width:200px;
height:200px;
top:10%;
left:10%;
}

.circle2{
width:150px;
height:150px;
bottom:10%;
right:10%;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.footer{
margin-top:15px;
font-size:12px;
color:#777;
}

</style>

</head>
