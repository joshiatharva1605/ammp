<!DOCTYPE html>
<html>

<head>
    <title>Supervisor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#f4f6f9;
        }

        .header{
            background:#0b2a5b;
            color:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 20px;
        }

        .header h2{
            margin:0;
        }

        .date{
            font-size:18px;
            font-weight:bold;
        }

        .menu{
            font-size:28px;
            cursor:pointer;
        }

        .sidebar{
            position:fixed;
            top:0;
            right:-260px;
            width:260px;
            height:100%;
            background:#1f3b73;
            transition:0.3s;
            z-index:999;
            padding-top:20px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:18px;
            border-bottom:1px solid rgba(255,255,255,0.2);
        }

        .sidebar a:hover{
            background:#2e5aa7;
        }

        .closebtn{
            color:white;
            font-size:25px;
            text-align:right;
            padding:10px 20px;
            cursor:pointer;
        }

        .cards{
            display:flex;
            gap:15px;
            flex-wrap:wrap;
            padding:20px;
        }

        .card{
            flex:1;
            min-width:180px;
            background:#1f5fa5;
            color:white;
            padding:20px;
            border-radius:8px;
            text-align:center;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .card h1{
            margin:0;
            font-size:40px;
        }

        .main{
            display:flex;
        }

        .charts{
            width:75%;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
            padding:20px;
        }

        .section{
            background:white;
            padding:15px;
            border-radius:8px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .rightpanel{
            width:25%;
            padding:20px;
        }

        .operatorbox{
            background:white;
            padding:20px;
            border-radius:8px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .skillgrid{
            display:grid;
            grid-template-columns:1fr;
            gap:12px;
        }

        .avl{
            background:#dcfce7;
            padding:15px;
            border-radius:6px;
            text-align:center;
            border: 1px solid #bbf7d0;
        }

        .avl h2 {
            margin: 0 0 5px 0;
            font-size: 28px;
            color: #16a34a;
        }

        .avl span {
            font-weight: bold;
            color: #14532d;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>DOJO 2.0 Monitoring Dashboard</h2>
    <div class="date" id="currentDate"></div>
    <div class="menu" onclick="openMenu()">☰</div>
</div>

<div class="sidebar" id="sidebar">
    <div class="closebtn" onclick="closeMenu()">❌</div>
    <a href="/attendance">Attendance</a>
    <a href="/allocation">Allocation</a>
    <a href="/">Logout</a>
</div>

<div class="cards">
    <div class="card">
        <h1 id="totalStations">0</h1>
        <p>Total Stations</p>
    </div>

    <div class="card">
        <h1 id="operatorsRequired">0</h1>
        <p>Operators Required</p>
    </div>

    <div class="card">
        <h1 id="operatorsAvailable">0</h1>
        <p>Operators Available</p>
    </div>

    <div class="card">
        <h1 id="bufferRequired">0</h1>
        <p>Buffer Required</p>
    </div>

    <div class="card">
        <h1 id="bufferAvailable">0</h1>
        <p>Buffer Available</p>
    </div>
</div>

<div class="main">
    <div class="charts">
        <div class="section">
            <h3>Manpower Availability Trend</h3>
            <canvas id="manpowerChart"></canvas>
        </div>

        <div class="section">
            <h3>Attrition Rate Trend</h3>
            <canvas id="attritionChart"></canvas>
        </div>

        <div class="section">
            <h3>Buffer Availability Trend</h3>
            <canvas id="bufferChart"></canvas>
        </div>

        <div class="section">
            <h3>Absenteeism Trend</h3>
            <canvas id="absenteeChart"></canvas>
        </div>
    </div>

    <div class="rightpanel">
        <div class="operatorbox">
            <h3>Available Operators</h3>
            <div class="skillgrid" id="skillGrid">
                </div>
        </div>
    </div>
</div>

<script>
/* =========================================
   DATE
========================================= */
let today = new Date()
let days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"]
document.getElementById("currentDate").innerText = days[today.getDay()] + ", " + today.toLocaleDateString()

/* =========================================
   SIDEBAR
========================================= */
function openMenu(){ document.getElementById("sidebar").style.right = "0px" }
function closeMenu(){ document.getElementById("sidebar").style.right = "-260px" }

/* =========================================
   CHART VARIABLES
========================================= */
let manpowerChart
let attritionChart
let bufferChart
let absenteeChart

/* =========================================
   LOAD DASHBOARD
========================================= */
async function loadDashboard(){
    try{
        let res = await fetch("/api/dashboard_data")
        let data = await res.json()

        /* CARDS */
        document.getElementById("totalStations").innerText = data.total_stations
        document.getElementById("operatorsRequired").innerText = data.operators_required
        document.getElementById("operatorsAvailable").innerText = data.operators_available
        document.getElementById("bufferRequired").innerText = data.buffer_required
        document.getElementById("bufferAvailable").innerText = data.buffer_available

        /* STRICT L1-L4 PRESENCE AGGREGATION MAP */
        let activePresenceCounters = {
            "L1": 0,
            "L2": 0,
            "L3": 0,
            "L4": 0
        };

        if (data.skills && Array.isArray(data.skills)) {
            data.skills.forEach(s => {
                let rawLabel = String(s.skill).trim().toUpperCase();
                let targetKey = null;

                // Handle string normalizations (e.g., Level A, A, or L1 maps into L1)
                if (rawLabel.includes("A") || rawLabel === "L1") targetKey = "L1";
                else if (rawLabel.includes("B") || rawLabel === "L2") targetKey = "L2";
                else if (rawLabel.includes("C") || rawLabel === "L3") targetKey = "L3";
                else if (rawLabel.includes("D") || rawLabel === "L4") targetKey = "L4";

                if (targetKey) {
                    // Accumulate available operator counts directly
                    activePresenceCounters[targetKey] += parseInt(s.available || 0, 10);
                }
            });
        }

        /* INJECT CLEAN AVAILABLE INTERFACES */
        let html = "";
        Object.keys(activePresenceCounters).forEach(level => {
            html += `
            <div class="avl">
                <h2 id="count-${level}">${activePresenceCounters[level]}</h2>
                <span>${level} Available</span>
            </div>`;
        });
        document.getElementById("skillGrid").innerHTML = html;

        /* UPDATE CHARTS */
        updateCharts(data)
    }
    catch(error){
        console.error(error)
        alert("Error Loading Dashboard")
    }
}

/* =========================================
   CHARTS INITIALIZATION
========================================= */
function createCharts(){
    manpowerChart = new Chart(
    document.getElementById("manpowerChart"),
    {
        type:"bar",
        data:{
            labels:["Today"],
            datasets:[{
                label:"Operators Available",
                data:[0]
            }]
        }
    })

    attritionChart = new Chart(
    document.getElementById("attritionChart"),
    {
        type:"line",
        data:{
            labels:["Today"],
            datasets:[{
                label:"Operators Required",
                data:[0]
            }]
        }
    })

    bufferChart = new Chart(
    document.getElementById("bufferChart"),
    {
        type:"line",
        data:{
            labels:["Today"],
            datasets:[{
                label:"Buffer Available",
                data:[0]
            }]
        }
    })

    absenteeChart = new Chart(
    document.getElementById("absenteeChart"),
    {
        type:"line",
        data:{
            labels:["Today"],
            datasets:[{
                label:"Absent Operators",
                data:[0]
            }]
        }
    })
}

/* =========================================
   UPDATE CHARTS
========================================= */
function updateCharts(data){
    manpowerChart.data.datasets[0].data = [data.operators_available]
    manpowerChart.update()

    attritionChart.data.datasets[0].data = [data.operators_required]
    attritionChart.update()

    bufferChart.data.datasets[0].data = [data.buffer_available]
    bufferChart.update()

    let absent = data.operators_required - data.operators_available
    if(absent < 0){ absent = 0 }

    absenteeChart.data.datasets[0].data = [absent]
    absenteeChart.update()
}

/* =========================================
   INITIAL EXECUTION
========================================= */
createCharts()
loadDashboard()

/* =========================================
   AUTO REFRESH INTERVAL (5 SECONDS)
========================================= */
setInterval(()=>{
    loadDashboard()
},5000)
</script>

</body>
</html>
